<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HiPass 영수증</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<div class="container">

  <header>
    <div class="brand">
      <div class="brand-icon">
        <svg width="34" height="34" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="34" height="34" rx="8" fill="#F5C518"/>
          <rect x="10" y="7" width="3.5" height="20" rx="1.75" fill="#0B0D12"/>
          <rect x="20.5" y="7" width="3.5" height="20" rx="1.75" fill="#0B0D12"/>
          <rect x="15.25" y="8" width="3.5" height="4.5" rx="1" fill="#0B0D12"/>
          <rect x="15.25" y="14.75" width="3.5" height="4.5" rx="1" fill="#0B0D12"/>
          <rect x="15.25" y="21.5" width="3.5" height="4.5" rx="1" fill="#0B0D12"/>
        </svg>
      </div>
      <div class="brand-text">
        <span class="brand-name">HIPASS</span>
        <span class="brand-sub">영수증 자동수집 시스템</span>
      </div>
    </div>
    <div id="header-actions">
      <button id="delete-all-btn" onclick="deleteAllScreenshots()">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M6.5 1h3a.5.5 0 0 1 .5.5v1H6v-1a.5.5 0 0 1 .5-.5M11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3A1.5 1.5 0 0 0 5 1.5v1H1.5a.5.5 0 0 0 0 1h.538l.853 10.66A2 2 0 0 0 4.885 16h6.23a2 2 0 0 0 1.994-1.84l.853-10.66h.538a.5.5 0 0 0 0-1z"/></svg>
        전체 삭제
      </button>
      <button id="refresh-btn" onclick="startRefresh()">
        <svg id="refresh-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="13" height="13"><path fill-rule="evenodd" d="M15.312 11.424a5.5 5.5 0 01-9.201 2.466l-.312-.311h2.433a.75.75 0 000-1.5H3.989a.75.75 0 00-.75.75v4.242a.75.75 0 001.5 0v-2.43l.31.31a7 7 0 0011.712-3.138.75.75 0 00-1.449-.39zm1.23-3.723a.75.75 0 00.219-.53V2.929a.75.75 0 00-1.5 0V5.36l-.31-.31A7 7 0 003.239 8.188a.75.75 0 101.448.389A5.5 5.5 0 0113.89 6.11l.311.31h-2.432a.75.75 0 000 1.5h4.243a.75.75 0 00.53-.219z" clip-rule="evenodd" /></svg>
        전체 캡처
      </button>
    </div>
  </header>

  <div id="status-bar" class="hidden">
    <div id="status-top">
      <span id="status-icon"></span>
      <span id="status-text"></span>
    </div>
    <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
  </div>

  <div id="cards-grid">
    {% for item in screenshots %}
    <div class="day-card {{ 'has-capture' if item.exists else 'no-capture' }}" style="animation-delay:{{ loop.index0 * 40 }}ms">
      <div class="card-date-col">
        <span class="card-date">{{ item.date }}</span>
        <span class="card-dayname" data-date="{{ item.date }}"></span>
      </div>
      <div class="card-status-col">
        {% if item.exists %}
          <span class="status-pip green"></span>
          <span class="status-word captured">캡처됨</span>
        {% else %}
          <span class="status-pip dim"></span>
          <span class="status-word empty-label">기록 없음</span>
        {% endif %}
      </div>
      <div class="card-actions-col">
        {% if item.exists %}
          <button class="preview-btn" onclick="openModal('/screenshots/{{ item.filename }}')">미리보기</button>
          <a class="dl-btn" href="/screenshots/{{ item.filename }}" download="{{ item.filename }}">저장</a>
        {% endif %}
        <button class="capture-icon-btn" data-date="{{ item.date }}"
                onclick="startDateCapture('{{ item.date }}')" title="{{ item.date }} 재캡처">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="13" height="13">
            <path fill-rule="evenodd" d="M15.312 11.424a5.5 5.5 0 01-9.201 2.466l-.312-.311h2.433a.75.75 0 000-1.5H3.989a.75.75 0 00-.75.75v4.242a.75.75 0 001.5 0v-2.43l.31.31a7 7 0 0011.712-3.138.75.75 0 00-1.449-.39zm1.23-3.723a.75.75 0 00.219-.53V2.929a.75.75 0 00-1.5 0V5.36l-.31-.31A7 7 0 003.239 8.188a.75.75 0 101.448.389A5.5 5.5 0 0113.89 6.11l.311.31h-2.432a.75.75 0 000 1.5h4.243a.75.75 0 00.53-.219z" clip-rule="evenodd" />
          </svg>
        </button>
      </div>
    </div>
    {% endfor %}
  </div>

  <details id="log-details">
    <summary>
      <span class="summary-arrow">▸</span>
      <span>캡처 로그</span>
    </summary>
    <div class="log-terminal">
      <table class="log-table">
        <thead>
          <tr><th>날짜</th><th>상태</th><th>메시지</th><th>시각</th></tr>
        </thead>
        <tbody id="log-tbody">
          <tr><td colspan="4" class="log-empty">불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>
  </details>

</div>

<!-- Modal -->
<div id="modal-overlay" onclick="closeModal()">
  <div id="modal-box" onclick="event.stopPropagation()">
    <img id="modal-img" src="" alt="" />
    <button id="modal-close" onclick="closeModal()">✕</button>
  </div>
</div>

<script>
let _pollTimer = null;
let _hideTimer = null;

const DAYS = ['일', '월', '화', '수', '목', '금', '토'];

const CAPTURE_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="13" height="13"><path fill-rule="evenodd" d="M15.312 11.424a5.5 5.5 0 01-9.201 2.466l-.312-.311h2.433a.75.75 0 000-1.5H3.989a.75.75 0 00-.75.75v4.242a.75.75 0 001.5 0v-2.43l.31.31a7 7 0 0011.712-3.138.75.75 0 00-1.449-.39zm1.23-3.723a.75.75 0 00.219-.53V2.929a.75.75 0 00-1.5 0V5.36l-.31-.31A7 7 0 003.239 8.188a.75.75 0 101.448.389A5.5 5.5 0 0113.89 6.11l.311.31h-2.432a.75.75 0 000 1.5h4.243a.75.75 0 00.53-.219z" clip-rule="evenodd" /></svg>`;

document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.card-dayname[data-date]').forEach(el => {
    const d = new Date(el.dataset.date + 'T00:00:00');
    const day = d.getDay();
    el.textContent = DAYS[day];
    if (day === 0 || day === 6) el.classList.add('weekend');
  });
  reloadLogs();
});

function setAllCaptureIconsDisabled(disabled) {
  document.querySelectorAll('.capture-icon-btn').forEach(btn => { btn.disabled = disabled; });
}

function setDateIconSpinning(dateStr, spinning) {
  const btn = document.querySelector(`.capture-icon-btn[data-date="${dateStr}"]`);
  if (!btn) return;
  const svg = btn.querySelector('svg');
  if (svg) svg.classList.toggle('spinning', spinning);
}

function openModal(src) {
  document.getElementById('modal-img').src = src;
  document.getElementById('modal-overlay').classList.add('active');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
}

function showStatus(msg, icon) {
  const bar = document.getElementById('status-bar');
  document.getElementById('status-icon').textContent = icon ?? '⏳';
  document.getElementById('status-text').textContent = msg;
  bar.classList.remove('hidden', 'done');
  if (_hideTimer) { clearTimeout(_hideTimer); _hideTimer = null; }
}

function completeStatus(msg) {
  const bar = document.getElementById('status-bar');
  document.getElementById('status-icon').textContent = '✓';
  document.getElementById('status-text').textContent = msg;
  bar.classList.add('done');
  _hideTimer = setTimeout(() => bar.classList.add('hidden'), 3000);
}

function showProgress(pct) {
  document.getElementById('progress-bar').style.width = pct + '%';
}

async function startRefresh() {
  const btn = document.getElementById('refresh-btn');
  const deleteBtn = document.getElementById('delete-all-btn');
  btn.disabled = true;
  deleteBtn.disabled = true;
  setAllCaptureIconsDisabled(true);
  showStatus('전체 캡처 시작 중...');
  showProgress(0);

  const res = await fetch('/api/refresh', { method: 'POST' });
  const { job_id } = await res.json();
  pollStatus(job_id, [btn, deleteBtn]);
}

async function startDateCapture(dateStr) {
  setAllCaptureIconsDisabled(true);
  document.getElementById('refresh-btn').disabled = true;
  document.getElementById('delete-all-btn').disabled = true;
  setDateIconSpinning(dateStr, true);
  showStatus(`${dateStr} 캡처 시작 중...`);
  showProgress(0);

  const res = await fetch(`/api/capture/${dateStr}`, { method: 'POST' });
  const data = await res.json();
  if (data.error) {
    showStatus(`오류: ${data.error}`, '✗');
    setAllCaptureIconsDisabled(false);
    document.getElementById('refresh-btn').disabled = false;
    document.getElementById('delete-all-btn').disabled = false;
    setDateIconSpinning(dateStr, false);
    return;
  }
  pollStatus(data.job_id, [document.getElementById('refresh-btn'), document.getElementById('delete-all-btn')], dateStr);
}

async function deleteAllScreenshots() {
  if (!confirm('모든 스크린샷을 삭제하시겠습니까?')) return;
  const btn = document.getElementById('delete-all-btn');
  btn.disabled = true;
  showStatus('삭제 중...');
  const res = await fetch('/api/screenshots/delete-all', { method: 'POST' });
  const data = await res.json();
  await reloadTable();
  btn.disabled = false;
  completeStatus(`${data.deleted}개 삭제 완료`);
}

function pollStatus(job_id, btnsToRestore, spinningDateStr) {
  _pollTimer = setInterval(async () => {
    const res = await fetch(`/api/status/${job_id}`);
    const job = await res.json();
    if (job.error) { clearInterval(_pollTimer); return; }

    const pct = job.total > 0 ? Math.round(job.done / job.total * 100) : 0;
    const dateLabel = job.current_date ? ` — ${job.current_date}` : '';
    showStatus(`캡처 중 (${job.done}/${job.total})${dateLabel}`);
    showProgress(pct);

    if (job.finished) {
      clearInterval(_pollTimer);
      showProgress(100);
      await reloadTable();
      await reloadLogs();
      setAllCaptureIconsDisabled(false);
      if (spinningDateStr) setDateIconSpinning(spinningDateStr, false);
      if (btnsToRestore) btnsToRestore.forEach(b => b.disabled = false);
      completeStatus(`완료 (${job.done}/${job.total})`);
    }
  }, 1500);
}

function buildCard(item, index) {
  const d = new Date(item.date + 'T00:00:00');
  const day = d.getDay();
  const dayLabel = DAYS[day];
  const isWeekend = day === 0 || day === 6;
  const dayClass = isWeekend ? ' weekend' : '';

  const statusHTML = item.exists
    ? `<span class="status-pip green"></span><span class="status-word captured">캡처됨</span>`
    : `<span class="status-pip dim"></span><span class="status-word empty-label">기록 없음</span>`;

  const actionBtns = item.exists
    ? `<button class="preview-btn" onclick="openModal('/screenshots/${item.filename}')">미리보기</button>
       <a class="dl-btn" href="/screenshots/${item.filename}" download="${item.filename}">저장</a>`
    : '';

  return `<div class="day-card ${item.exists ? 'has-capture' : 'no-capture'}" style="animation-delay:${index * 35}ms">
    <div class="card-date-col">
      <span class="card-date">${item.date}</span>
      <span class="card-dayname${dayClass}">${dayLabel}</span>
    </div>
    <div class="card-status-col">${statusHTML}</div>
    <div class="card-actions-col">
      ${actionBtns}
      <button class="capture-icon-btn" data-date="${item.date}"
              onclick="startDateCapture('${item.date}')" title="${item.date} 재캡처">
        ${CAPTURE_SVG}
      </button>
    </div>
  </div>`;
}

async function reloadTable() {
  const res = await fetch('/api/screenshots');
  const list = await res.json();
  document.getElementById('cards-grid').innerHTML = list.map((item, i) => buildCard(item, i)).join('');
}

async function reloadLogs() {
  const res = await fetch('/api/logs');
  const logs = await res.json();
  logs.sort((a, b) => b.timestamp.localeCompare(a.timestamp));
  const tbody = document.getElementById('log-tbody');
  if (!logs.length) {
    tbody.innerHTML = '<tr><td colspan="4" class="log-empty">로그 없음</td></tr>';
    return;
  }
  const cls   = { success: 'status-success', empty: 'status-empty', error: 'status-error', skipped: 'status-skipped' };
  const label = { success: '✓ 성공', empty: '— 없음', error: '✗ 오류', skipped: '↩ 스킵' };
  tbody.innerHTML = logs.map(l => `<tr>
    <td>${l.date}</td>
    <td class="${cls[l.status] || ''}">${label[l.status] || l.status}</td>
    <td>${l.message}</td>
    <td>${l.timestamp}</td>
  </tr>`).join('');
}
</script>
</body>
</html>
